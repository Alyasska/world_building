<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="dashboard" data-locale="ru">
    <div class="shell">
      <aside class="nav-panel">
        <div class="brand-block">
          <p class="eyebrow" data-ui-text="shell.brandEyebrow"></p>
          <h1 data-ui-text="shell.brandTitle"></h1>
          <p data-ui-text="shell.brandNote"></p>
        </div>

        <div class="locale-switch">
          <button type="button" class="locale-button" data-locale-choice="ru">RU</button>
          <button type="button" class="locale-button" data-locale-choice="en">EN</button>
        </div>

        <form class="nav-search" id="global-search-form">
          <label class="field-label" for="global-search-input" data-ui-text="search.quickLabel"></label>
          <div class="search-inline">
            <input id="global-search-input" class="input" type="search" name="q" data-ui-placeholder="search.placeholder" />
            <button type="submit" class="button" data-ui-text="search.submit"></button>
          </div>
        </form>

        <nav>
          <a href="./index.html" class="nav-link" data-ui-text="shell.nav.dashboard"></a>
          <a href="./places.html" class="nav-link" data-ui-text="shell.nav.places"></a>
          <a href="./characters.html" class="nav-link" data-ui-text="shell.nav.characters"></a>
          <a href="./search.html" class="nav-link" data-ui-text="shell.nav.search"></a>
        </nav>

        <section class="nav-note card subtle-card">
          <h3 data-ui-text="shell.previewModeTitle"></h3>
          <p data-ui-text="shell.previewModeDescription"></p>
        </section>
      </aside>

      <main class="content">
        <section class="hero card">
          <div>
            <p class="eyebrow" data-ui-text="dashboard.eyebrow"></p>
            <h2 data-ui-text="dashboard.title"></h2>
            <p class="muted" data-ui-text="dashboard.description"></p>
          </div>
          <div class="meta-row">
            <span class="badge" data-ui-text="dashboard.previewBadges.0"></span>
            <span class="badge" data-ui-text="dashboard.previewBadges.1"></span>
            <span class="badge" data-ui-text="dashboard.previewBadges.2"></span>
          </div>
        </section>

        <section class="stats-grid" id="summary-cards"></section>

        <section class="split-grid">
          <article class="card">
            <div class="panel-header">
              <h3 data-ui-text="dashboard.recentTitle"></h3>
              <a href="./search.html" class="button-link" data-ui-text="dashboard.openSearch"></a>
            </div>
            <div class="stack" id="recent-records"></div>
          </article>

          <article class="card">
            <h3 data-ui-text="dashboard.progressTitle"></h3>
            <ul class="checklist" id="progress-checklist"></ul>
          </article>
        </section>

        <section class="split-grid">
          <article class="card">
            <div class="panel-header">
              <h3 data-ui-text="dashboard.focusTitle"></h3>
              <span class="badge" data-ui-text="dashboard.focusBadge"></span>
            </div>
            <p class="muted" data-ui-text="dashboard.focusDescription"></p>
            <div class="actions-row">
              <a href="./places.html" class="button-link" data-ui-text="dashboard.reviewPlacesFlow"></a>
              <a href="./characters.html" class="button-link" data-ui-text="dashboard.reviewCharactersFlow"></a>
            </div>
          </article>

          <article class="card">
            <div class="panel-header">
              <h3 data-ui-text="dashboard.coverageTitle"></h3>
              <span class="badge" data-ui-text="dashboard.coverageBadge"></span>
            </div>
            <p class="muted" data-ui-text="dashboard.coverageDescription"></p>
            <div class="stack" id="dashboard-capabilities"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="./ui-text.js"></script>
    <script src="./mock-app.js"></script>
  </body>
</html>
